name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Install Android SDK platform
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
          echo "KEYSTORE_PATH=/tmp/release.jks" >> $GITHUB_ENV
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build, Lint, and Test
        run: ./gradlew assembleRelease assembleDebug bundleRelease lintDebug testDebugUnitTest :wear:testDebugUnitTest jacocoTestReport --no-daemon --parallel --build-cache
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Test Report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit Tests
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit

      - name: Coverage Threshold
        run: |
          REPORT=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          if [ ! -f "$REPORT" ]; then echo "JaCoCo report not found"; exit 1; fi
          MISSED=$(grep -oP 'type="LINE"[^/]*missed="\K[0-9]+' "$REPORT" | tail -1)
          COVERED=$(grep -oP 'type="LINE"[^/]*covered="\K[0-9]+' "$REPORT" | tail -1)
          TOTAL=$((MISSED + COVERED))
          if [ "$TOTAL" -eq 0 ]; then echo "No line data"; exit 1; fi
          PCT=$((COVERED * 100 / TOTAL))
          echo "Line coverage: ${PCT}% (${COVERED}/${TOTAL})"
          if [ "$PCT" -lt 40 ]; then echo "::error::Coverage ${PCT}% is below 40% threshold"; exit 1; fi

      - name: APK & AAB Size
        run: |
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          for f in app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/debug/app-debug.apk app/build/outputs/bundle/release/app-release.aab; do
            if [ -f "$f" ]; then
              SIZE=$(du -h "$f" | cut -f1)
              echo "| $(basename $f) | $SIZE |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: app/build/reports/jacoco/jacocoTestReport/html/
          retention-days: 7

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      # Upload APK artifacts (legacy sideload support)
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: apks-${{ github.sha }}
          path: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      # Upload AAB artifact (Play Store distribution)
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v7
        with:
          name: aab-${{ github.sha }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 1

  # Skip nightly release if SHA hasn't changed since last nightly
  check-nightly:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Compare SHA to last nightly
        id: check
        run: |
          LAST=$(gh release view nightly-build --repo ${{ github.repository }} --json targetCommitish -q .targetCommitish 2>/dev/null || echo "none")
          echo "changed=$([ "$LAST" != "${{ github.sha }}" ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create nightly release on push to main
  release:
    needs: [build, check-nightly]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-nightly.outputs.changed == 'true'

    steps:
      - name: Download APK Artifacts
        uses: actions/download-artifact@v8
        with:
          name: apks-${{ github.sha }}
          path: apks

      - name: Download AAB Artifact
        uses: actions/download-artifact@v8
        with:
          name: aab-${{ github.sha }}
          path: aab

      - name: List downloaded artifacts
        run: find apks aab -type f

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-build
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          name: "Nightly Build (${{ steps.date.outputs.date }})"
          body: |
            ## 🌙 Nightly Build

            **Commit:** ${{ github.sha }}
            **Date:** ${{ steps.date.outputs.date }}
            **Short SHA:** ${{ steps.sha.outputs.short }}

            ### Downloads
            | Variant | Description |
            |---------|-------------|
            | `app-release.aab` | Signed AAB for Play Store (requires signing secrets) |
            | `app-release-unsigned.apk` | Optimized release build (~2.5 MB) |
            | `app-debug.apk` | Debug build with LeakCanary |

            ### Installation
            1. Download the APK for your use case
            2. Enable "Install from unknown sources" on your device
            3. Install the APK

            ⚠️ **Note:** APKs are unsigned unless signing secrets are configured. AAB is for Play Store upload only.

            ---
            _This release is automatically replaced on each commit to main._
          files: |
            apks/release/app-release-unsigned.apk
            apks/debug/app-debug.apk
            aab/app-release.aab
          prerelease: true
          make_latest: false
        continue-on-error: true

      # Cleanup artifacts to save storage
      - name: Delete Artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            apks-${{ github.sha }}
            aab-${{ github.sha }}

  # Deploy signed AAB to Play Store internal test track on push to main
  deploy-internal:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download AAB Artifact
        uses: actions/download-artifact@v8
        with:
          name: aab-${{ github.sha }}
          path: aab

      - name: Upload to Play Store internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.cascadiacollections.sir
          releaseFiles: aab/app-release.aab
          track: internal
          status: completed
        # No-ops gracefully if PLAY_SERVICE_ACCOUNT_JSON secret is not yet configured
        continue-on-error: true
